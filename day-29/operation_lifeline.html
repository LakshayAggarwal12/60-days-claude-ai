function ProgressBar(props) {

  var initial = animate ? 0 : clamp(value, 0, 100);
  var state = useState(initial);
  var w = state[0]; var setW = state[1];
  useEffect(function() {
    if (animate) {
      var t = setTimeout(function() { setW(clamp(value, 0, 100)); }, 80);
      return function() { clearTimeout(t); };
    } else {
      setW(clamp(value, 0, 100));

  }, [value]);
  var c = color || scoreColor(w);
  return React.createElement('div', { className: 'pb-wrap' },

              <div style={{marginTop:'0.6rem',display:'flex',gap:'0.3rem',flexWrap:'wrap'}}>
                {a.tags.map(function(t) { return <span className="tag" key={t}>{t}</span>; })}
              </div>
            </div>
          );
        })}
      </div>
      {simulated && (
        <div className="card fade-up">
          <div className="card-hd"><span className="card-icon">📊</span><div><div className="card-title">Simulated Business Outcomes</div><div className="card-sub">How your 3 chosen actions reshape the business metrics</div></div></div>
          <div className="metrics-grid">
            {metricDefs.map(function(m) {
              var v = metrics[m.key];
              return (
                <div className="metric-cell" key={m.key}>
                  <div className="metric-top"><div><div className="metric-name">{m.label}</div><div className="metric-hint">{m.hint}</div></div><div className="metric-val" style={{color: scoreColor(v)}}>{v}</div></div>
                  <ProgressBar value={v} color={scoreColor(v)} animate={true} />
                </div>
              );
            })}
          </div>
          <div className="ctx ctx-green" style={{marginBottom:0}}><strong>War Room Score: {warScore}/100</strong> — {warScore >= 70 ? 'Excellent strategy. You balanced speed, cost, and customer impact well.' : warScore >= 55 ? 'Solid choices with some trade-offs. Certain combinations would have improved outcomes.' : 'Consider how customer communication and inventory protection work together next time.'}</div>
        </div>
      )}
      <div className="row-end">
        {!simulated
          ? <button className="btn btn-primary" disabled={selected.length < 3} onClick={simulate}>⚡ Simulate Consequences</button>
          : <button className="btn btn-primary" onClick={function() { onNext({ metrics: metrics, warScore: warScore }); }}>Proceed to Negotiation →</button>}
      </div>
    </div>
  );
}

function Negotiation(props) {
  var onNext = props.onNext;
  var riState = useState(0); var ri = riState[0]; var setRi = riState[1];
  var trustState = useState(38); var trust = trustState[0]; var setTrust = trustState[1];
  var priceState = useState(138); var price = priceState[0]; var setPrice = priceState[1];
  var leadState = useState(45); var lead = leadState[0]; var setLead = leadState[1];
  var doneState = useState(false); var done = doneState[0]; var setDone = doneState[1];
  var histState = useState([]); var history = histState[0]; var setHistory = histState[1];

  function choose(c) {
    var nT = clamp(trust + c.tD, 0, 100);
    var nP = clamp(price + c.pD, 80, 165);
    var nL = clamp(lead + c.lD, 7, 60);
    setTrust(nT); setPrice(nP); setLead(nL);
    setHistory(history.concat([{ round: NEG_ROUNDS[ri].title, text: c.text }]));
    if (ri >= NEG_ROUNDS.length - 1) setDone(true);
    else setRi(ri + 1);
  }

  var negScore = Math.round((trust * 0.4) + (clamp((165 - price) / 85 * 100, 0, 100) * 0.35) + (clamp((60 - lead) / 53 * 100, 0, 100) * 0.25));
  var r = NEG_ROUNDS[ri];
  var tC = trust >= 60 ? '#22d3a0' : trust >= 35 ? '#ffb547' : '#ff4d6a';
  var pC = price <= 100 ? '#22d3a0' : price <= 120 ? '#ffb547' : '#ff4d6a';
  var lC = lead <= 21 ? '#22d3a0' : lead <= 35 ? '#ffb547' : '#ff4d6a';

  return (
    <div className="fade-up">
      <div className="eyebrow">Phase 4 — Supplier Negotiation</div>
      <h1 className="sec-title">4-Round Negotiation</h1>
      <p className="sec-sub">Negotiate terms with your emergency backup supplier. Every choice affects Trust, Price, and Lead Time — and they compound across rounds.</p>
      <div className="neg-stats">
        <div className="neg-stat"><div className="neg-val" style={{color: tC}}>{trust}</div><div className="neg-lbl">🤝 Trust Score</div><ProgressBar value={trust} color={tC} /></div>
        <div className="neg-stat"><div className="neg-val" style={{color: pC}}>{price}%</div><div className="neg-lbl">💰 Price vs Market</div><ProgressBar value={clamp(100 - (price - 80), 0, 100)} color={pC} /></div>
        <div className="neg-stat"><div className="neg-val" style={{color: lC}}>{lead}d</div><div className="neg-lbl">⏱️ Lead Time</div><ProgressBar value={clamp(100 - (lead - 7) * 2, 0, 100)} color={lC} /></div>
      </div>
      {!done ? (
        <div>
          <div className="round-hd"><div className="round-badge">Round {ri + 1} / {NEG_ROUNDS.length}</div><div className="round-title">{r.title}</div></div>
          <div className="ctx"><strong>Situation:</strong> {r.ctx}</div>
          <div className="choices">
            {r.choices.map(function(c, i) {
              return (
                <button key={i} className="choice-btn" onClick={function() { choose(c); }}>
                  <div className="ch-label">{String.fromCharCode(65 + i)}</div>
                  <div style={{flex:1}}>
                    <div className="ch-title">{c.text}</div>
                    <div className="ch-desc">{c.desc}</div>
                    <div className="ch-fx">
                      <span style={{color: c.tD > 0 ? '#22d3a0' : '#ff4d6a'}}>Trust {c.tD > 0 ? '+' : ''}{c.tD}</span>
                      <span style={{color:'var(--text3)'}}>·</span>
                      <span style={{color: c.pD < 0 ? '#22d3a0' : c.pD > 0 ? '#ff4d6a' : 'var(--text2)'}}>Price {c.pD > 0 ? '+' : ''}{c.pD}%</span>
                      <span style={{color:'var(--text3)'}}>·</span>
                      <span style={{color: c.lD < 0 ? '#22d3a0' : c.lD > 0 ? '#ff4d6a' : 'var(--text2)'}}>Lead {c.lD > 0 ? '+' : ''}{c.lD}d</span>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
          <div className="prog-rounds">
            {NEG_ROUNDS.map(function(_, i) {
              var bg = i < ri ? 'var(--green)' : i === ri ? 'var(--blue)' : 'var(--surf3)';
              return <div key={i} className="prog-seg" style={{background: bg}}></div>;
            })}
          </div>
        </div>
      ) : (
        <div className="fade-up">
          <div className="neg-complete-box">
            <div style={{fontSize:'0.72rem',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:'0.4rem'}}>Negotiation Score</div>
            <div className="neg-score-big">{negScore}</div>
            <div style={{fontSize:'0.82rem',color:'var(--text2)',marginBottom:'0.4rem'}}>out of 100</div>
            <div style={{fontWeight:700,color: negScore >= 70 ? 'var(--green)' : negScore >= 50 ? 'var(--amber)' : 'var(--red)'}}>{negScore >= 70 ? '🌟 Expert Negotiator' : negScore >= 50 ? '✅ Solid Negotiator' : '⚠️ Room to Improve'}</div>
          </div>
          <div className="card">
            <div className="card-hd"><span className="card-icon">📋</span><div className="card-title">Your Negotiation Decisions</div></div>
            {history.map(function(h, i) {
              return (
                <div key={i} style={{display:'flex',gap:'0.85rem',padding:'0.6rem 0',borderBottom: i < history.length - 1 ? '1px solid var(--border)' : 'none',fontSize:'0.84rem'}}>
                  <span style={{color:'var(--blue)',fontWeight:700,minWidth:72}}>Round {i + 1}</span>
                  <span style={{color:'var(--text2)',flex:1}}>{h.text}</span>
                </div>
              );
            })}
          </div>
          <div className="row-end"><button className="btn btn-primary" onClick={function() { onNext({ negScore: negScore, trust: trust, price: price, lead: lead }); }}>CEO Boardroom →</button></div>
        </div>
      )}
    </div>
  );
}

function CEOBoardroom(props) {
  var questions = props.questions;
  var onNext = props.onNext;
  var qiState = useState(0); var qi = qiState[0]; var setQi = qiState[1];
  var selState = useState(null); var sel = selState[0]; var setSel = selState[1];
  var revState = useState(false); var revealed = revState[0]; var setRevealed = revState[1];
  var correctState = useState(0); var correctCount = correctState[0]; var setCorrectCount = correctState[1];
  if (!questions || questions.length === 0) return null;
  var q = questions[qi];
  if (!q) return null;

  function selectOpt(i) { if (revealed) return; setSel(i); setRevealed(true); }

  function next() {
    var isRight = sel === q.correct;
    var newCount = correctCount + (isRight ? 1 : 0);
    if (qi < questions.length - 1) {
      setCorrectCount(newCount); setQi(qi + 1); setSel(null); setRevealed(false);
    } else {
      onNext({ ceoScore: newCount * 20 });
    }
  }

  var displayScore = correctCount * 20;
  var progress = (qi / questions.length) * 100;

  return (
    <div className="fade-up">
      <div className="eyebrow">Phase 5 — CEO Boardroom</div>
      <h1 className="sec-title">Executive Decisions</h1>
      <p className="sec-sub">Five real leadership scenarios. No trick answers — these test whether you think like a seasoned executive under pressure.</p>
      <div className="ctx"><strong>You are the CEO.</strong> These questions are based on real patterns from how companies succeed and fail during supply chain crises. Think carefully, then read the expert explanation after each answer.</div>
      <div className="q-score-row"><div className="round-badge">Question {qi + 1} of {questions.length}</div><div style={{fontSize:'0.88rem',color:'var(--text2)'}}>Score: <strong style={{color:'var(--blue)'}}>{displayScore}/100</strong></div></div>
      <div className="q-progress"><div className="pb-fill" style={{width: progress + '%', background: 'var(--blue)', transition: 'width 0.5s'}}></div></div>
      <div className="q-card">
        <div className="q-text">❓ {q.q}</div>
        <div className="q-opts">
          {q.opts.map(function(opt, i) {
            var cls = 'q-opt';
            if (revealed) { if (i === q.correct) cls += ' opt-correct'; else if (i === sel) cls += ' opt-wrong'; }
            return <button key={i} className={cls} onClick={function() { selectOpt(i); }} disabled={revealed}><div className="q-marker">{String.fromCharCode(65 + i)}</div>{opt}</button>;
          })}
        </div>
        {revealed && <div className="q-explanation fade-up">{sel === q.correct ? '✅ Correct! ' : '❌ Not quite. '}{q.exp}</div>}
      </div>
      {revealed && <div className="row-end"><button className="btn btn-primary" onClick={next}>{qi < questions.length - 1 ? 'Next Question →' : 'View AI Strategy →'}</button></div>}
    </div>
  );
}

function AIStrategy(props) {
  var onNext = props.onNext;
  var selState = useState([]); var sel = selState[0]; var setSel = selState[1];

  function toggle(inv) {
    var found = sel.filter(function(s) { return s.id === inv.id; });
    if (found.length > 0) setSel(sel.filter(function(s) { return s.id !== inv.id; }));
    else if (sel.length < 2) setSel(sel.concat([inv]));
  }

  var aiScore = sel.reduce(function(s, i) { return s + i.score; }, 0);

  return (
    <div className="fade-up">
      <div className="eyebrow">Phase 6 — AI Strategy</div>
      <h1 className="sec-title">AI Investment Decisions</h1>
      <p className="sec-sub">The board approved a $4M AI budget. Choose 2 tools to deploy. This shapes your long-term supply chain resilience.</p>
      <div className="ctx ctx-green"><strong>Why AI?</strong> Supply chains generate enormous data — demand signals, supplier health, inventory levels, logistics patterns. AI processes this 10,000x faster than human teams and can predict disruptions weeks before they hit. Choose the tools that address your biggest gaps.</div>
      <div className="sel-count">{sel.length}/2 investments selected {sel.length === 2 ? '✅' : ''}</div>
      <div className="ai-grid">
        {AI_INVESTMENTS.map(function(inv) {
          var isSel = sel.filter(function(s) { return s.id === inv.id; }).length > 0;
          var isDis = !isSel && sel.length >= 2;
          return (
            <div key={inv.id} className={'ai-card' + (isSel ? ' ai-sel' : '') + (isDis ? ' ai-dis' : '')} onClick={function() { if (!isDis) toggle(inv); }}>
              {isSel && <div className="ai-chk">✓</div>}
              <div className="ai-icon">{inv.icon}</div>
              <div className="ai-name">{inv.name}</div>
              <div className="ai-desc">{inv.desc}</div>
              <div className="ai-impact">📊 {inv.impact}</div>
            </div>
          );
        })}
      </div>
      {sel.length === 2 && (
        <div className="ai-portfolio fade-up">
          <div className="card-hd"><span className="card-icon">🎯</span><div><div className="card-title">Your AI Portfolio</div><div className="card-sub">Combined impact of your two selected investments</div></div></div>
          <div className="ai-port-row">
            {sel.map(function(s) {
              return <div className="ai-port-item" key={s.id} style={{borderColor: s.color + '40'}}><div style={{color: s.color, fontWeight:700, marginBottom:'0.3rem', fontSize:'0.88rem'}}>{s.icon} {s.name}</div><div style={{fontSize:'0.77rem',color:'var(--text2)'}}>{s.impact}</div></div>;
            })}
          </div>
          <div className="ctx ctx-green" style={{marginBottom:0}}><strong>Portfolio Score: {aiScore}/42</strong> — {aiScore >= 40 ? 'Elite AI stack: maximum disruption prevention potential.' : aiScore >= 36 ? 'Strong portfolio with complementary capabilities.' : 'Functional foundation. Consider Supplier Risk Monitoring next cycle.'}</div>
        </div>
      )}
      <div className="row-end">
        <button className="btn btn-primary" disabled={sel.length < 2} onClick={function() { onNext({ aiScore: aiScore, aiChoices: sel.map(function(s) { return s.name; }) }); }}>View Final Results →</button>
      </div>
    </div>
  );
}

function FinalDashboard(props) {
  var scores = props.scores;
  var company = props.company;
  var crisis = props.crisis;
  var onReplay = props.onReplay;
  if (!company || !crisis) return null;

  var warScore = scores.warScore !== undefined ? scores.warScore : 65;
  var negScore = scores.negScore !== undefined ? scores.negScore : 50;
  var ceoScore = scores.ceoScore !== undefined ? scores.ceoScore : 60;
  var aiScore = scores.aiScore !== undefined ? scores.aiScore : 35;
  var metrics = scores.metrics || { cost: 65, inventory: 68, profit: 65, delivery: 68, satisfaction: 75 };
  var aiChoices = scores.aiChoices || [];

  var leadership = ceoScore;
  var negotiation = negScore;
  var resilience = warScore;
  var costControl = Math.round(metrics.cost);
  var riskMgmt = Math.min(100, Math.round(((aiScore - 33) / 9) * 50 + 50));
  var custSat = Math.round(metrics.satisfaction);

  var overall = Math.round(leadership * 0.20 + negotiation * 0.20 + resilience * 0.20 + costControl * 0.15 + riskMgmt * 0.15 + custSat * 0.10);

  var grade, gradeColor;
  if (overall >= 85) { grade = 'S — Supply Chain Master'; gradeColor = 'var(--teal)'; }
  else if (overall >= 70) { grade = 'A — Expert Operator'; gradeColor = 'var(--green)'; }
  else if (overall >= 55) { grade = 'B — Competent Leader'; gradeColor = 'var(--blue)'; }
  else if (overall >= 40) { grade = 'C — Needs Development'; gradeColor = 'var(--amber)'; }
  else { grade = 'D — Critical Gaps Found'; gradeColor = 'var(--red)'; }

  var subs = [
    { name: 'Leadership', icon: '👔', val: leadership, color: 'var(--blue)' },
    { name: 'Negotiation', icon: '🤝', val: negotiation, color: 'var(--teal)' },
    { name: 'Resilience', icon: '🛡️', val: resilience, color: 'var(--green)' },
    { name: 'Cost Control', icon: '💰', val: costControl, color: 'var(--amber)' },
    { name: 'Risk Management', icon: '⚡', val: riskMgmt, color: 'var(--purple)' },
    { name: 'Customer Satisfaction', icon: '😊', val: custSat, color: 'var(--pink)' }
  ];
  var sorted = subs.slice().sort(function(a,b) { return a.val - b.val; });
  var weakest = sorted[0];
  var strongest = sorted[sorted.length - 1];

  var overallFeedback = overall >= 75
    ? 'Exceptional crisis leadership. You demonstrated the hallmarks of a truly resilient supply chain organization — balancing speed with cost discipline, earning supplier trust, making data-driven C-suite decisions, and investing strategically in AI. Companies led this way survive crises and emerge stronger than their competitors.'
    : overall >= 55
    ? 'Solid performance under pressure with clear moments of strong judgment. Your supply chain fundamentals are sound. The gaps that emerged are learnable with focused practice — most executives only develop these instincts after experiencing a real disruption. This simulation helped you get there faster.'
    : 'The crisis exposed meaningful gaps in response speed and strategic decision-making. These are not permanent limitations — they are exactly what structured practice is designed to address. Study the expert explanations below and replay with a fresh scenario.';

  var weakFeedbacks = {
    'Leadership': 'executive judgment under uncertainty. The framework: communicate early with what you know, demand data before deciding, then own the outcome.',
    'Negotiation': 'value-based supplier negotiation. High-trust, evidence-based approaches consistently outperform pure price pressure — because relationships flex when the next crisis hits.',
    'Resilience': 'crisis response sequencing. The highest-performing combination is usually: customer communication first, then operational response, with cost-protection third.',
    'Cost Control': 'margin protection under stress. Triage order priority, protect high-margin customers, and defer low-margin volume to preserve profitability.',
    'Risk Management': 'proactive AI-powered risk monitoring. Supplier Risk Monitoring AI predicts 78% of disruptions 30+ days in advance — giving you response options you did not have this time.',
    'Customer Satisfaction': 'crisis communication and customer retention. A $5K proactive communication program protects $500K in customer lifetime value. It is always the highest-ROI crisis investment.'
  };
  var weakFeedback = weakFeedbacks[weakest.name] || 'foundational supply chain principles. Review the expert explanations above and replay with focus on this dimension.';

  var lessons = [
    'Supplier diversification is supply chain insurance. The ' + crisis.type + ' exposed exactly how dangerous concentration risk becomes when a single node fails.',
    'Speed of communication during a crisis matters as much as operational response. Customers forgive honest delays far more readily than they forgive silence.',
    'AI investments compound over time. Demand Forecasting and Supplier Risk Monitoring reduce future disruption severity by 35-60% — they pay back in the first avoided crisis.',
    'Negotiation is a relationship sport. High-trust supplier partnerships unlock flexibility — expedited orders, extended payment terms, prioritized allocation — that price leverage alone never can.',
    'Post-crisis, run a blameless post-mortem. The systems failed before the people did. Fix the systems, not the scapegoats.'
  ];

  return (
    <div className="fade-up">
      <div className="eyebrow">Final Report — Full Debrief</div>
      <h1 className="sec-title">Crisis Response Dashboard</h1>
      <p className="sec-sub">{company.name} · {crisis.type} Crisis · Complete Performance Analysis</p>
      <div className="score-hero">
        <div className="score-lbl">Overall Crisis Score</div>
        <div className="score-big">{overall}</div>
        <div style={{fontSize:'0.8rem',color:'var(--text2)',marginBottom:'0.5rem'}}>out of 100</div>
        <div className="score-grade" style={{color: gradeColor}}>{grade}</div>
      </div>
      <div className="subs-grid">
        {subs.map(function(s) {
          return <div className="sub-card" key={s.name}><div className="sub-top"><div className="sub-name">{s.icon} {s.name}</div><div className="sub-val" style={{color: scoreColor(s.val)}}>{s.val}</div></div><ProgressBar value={s.val} color={s.color} animate={true} /></div>;
        })}
      </div>
      <div className="feedback-card">
        <div className="fb-section"><div className="fb-label" style={{color:'var(--text2)'}}>📋 Overall Performance</div><div className="fb-text">{overallFeedback}</div></div>
        <div className="fb-section"><div className="fb-label" style={{color:'var(--red)'}}>❌ Biggest Gap — {weakest.name} ({weakest.val}/100)</div><div className="fb-text">Your lowest score was in <strong>{weakest.name}</strong>. The key to improvement here is {weakFeedback} Supply chain leaders who are strong in this area recover from disruptions 2x faster than peers.</div></div>
        <div className="fb-section"><div className="fb-label" style={{color:'var(--green)'}}>✅ Best Decision — {strongest.name} ({strongest.val}/100)</div><div className="fb-text">Your strongest performance was in <strong>{strongest.name}</strong>. This is a genuine competitive differentiator — build on it deliberately and it compounds across every future crisis your organization faces.</div></div>
        {aiChoices.length > 0 && <div className="fb-section"><div className="fb-label" style={{color:'var(--teal)'}}>🤖 AI Investment Impact</div><div className="fb-text">You invested in <strong>{aiChoices.join(' and ')}</strong>. These tools would have reduced this crisis financial impact by an estimated 28-42% if deployed before the event — and will dramatically reduce severity of the next one. Typical full payback in under 8 months.</div></div>}
        <div className="fb-section"><div className="fb-label" style={{color:'var(--blue)'}}>🎯 Expert Recommendation</div><div className="fb-text">To build a genuinely resilient supply chain at <strong>{company.name}</strong>: implement a three-tier supplier system per component category, mandate 30-day minimum safety stock for all A-class SKUs, establish a crisis communication playbook with pre-approved messaging, and deploy AI-powered supplier risk monitoring before next quarter ends. The cost of preparation is always less than the cost of recovery — usually by a factor of 8-15x.</div></div>
        <div className="fb-section">
          <div className="fb-label" style={{color:'var(--amber)'}}>📚 Key Lessons from This Simulation</div>
          <div className="lessons">{lessons.map(function(l, i) { return <div className="lesson-row" key={i}><div className="lesson-n">{i + 1}</div><div>{l}</div></div>; })}</div>
        </div>
      </div>
      <div className="replay-zone">
        <button className="btn btn-primary btn-lg" onClick={onReplay}>🔄 Play Again — New Scenario</button>
        <p className="replay-hint">Every replay: different company · different crisis · shuffled questions · new outcomes</p>
      </div>
    </div>
  );
}

function App() {
  var phaseState = useState('welcome'); var phase = phaseState[0]; var setPhase = phaseState[1];
  var coState = useState(null); var company = coState[0]; var setCompany = coState[1];
  var crState = useState(null); var crisis = crState[0]; var setCrisis = crState[1];
  var acState = useState([]); var actions = acState[0]; var setActions = acState[1];
  var qState = useState([]); var questions = qState[0]; var setQuestions = qState[1];
  var scState = useState({}); var scores = scState[0]; var setScores = scState[1];

  function go(p) { setPhase(p); window.scrollTo(0, 0); }

  function mergeScores(s) {
    setScores(function(prev) {
      var next = {};
      Object.keys(prev).forEach(function(k) { next[k] = prev[k]; });
      Object.keys(s).forEach(function(k) { next[k] = s[k]; });
      return next;
    });
  }

  function handleStart() {
    setCompany(generateCompany());
    setCrisis(generateCrisis());
    setActions(shuffleArr(WAR_ACTIONS_BASE));
    setQuestions(shuffleArr(CEO_Qs_BASE));
    setScores({});
    go('company');
  }

  function renderScreen() {
    if (phase === 'welcome') return React.createElement(WelcomeScreen, { onStart: handleStart });
    if (phase === 'company') return React.createElement(CompanyProfile, { company: company, onNext: function() { go('crisis'); } });
    if (phase === 'crisis') return React.createElement(CrisisAlert, { crisis: crisis, company: company, onNext: function() { go('warroom'); } });
    if (phase === 'warroom') return React.createElement(WarRoom, { actions: actions, onNext: function(s) { mergeScores(s); go('negotiation'); } });
    if (phase === 'negotiation') return React.createElement(Negotiation, { onNext: function(s) { mergeScores(s); go('ceo'); } });
    if (phase === 'ceo') return React.createElement(CEOBoardroom, { questions: questions, onNext: function(s) { mergeScores(s); go('ai'); } });
    if (phase === 'ai') return React.createElement(AIStrategy, { onNext: function(s) { mergeScores(s); go('final'); } });
    if (phase === 'final') return React.createElement(FinalDashboard, { scores: scores, company: company, crisis: crisis, onReplay: function() { go('welcome'); } });
    return null;
  }

  return (
    <div className="shell">
      <PhaseBar phase={phase} />
      <div className={phase === 'welcome' ? '' : 'page'}>{renderScreen()}</div>
    </div>
  );
}

var rootEl = document.getElementById('root');
var root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(App, null));
</script>
</body>
</html>
